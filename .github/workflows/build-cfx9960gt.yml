name: Build CFX-9960GT APK

on:
  push:
    branches: [ "main", "feature/supernote-cfx9960gt", "copilot/**" ]
    paths:
      - 'cfx9960gt-calculator/**'
      - '.github/workflows/build-cfx9960gt.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'cfx9960gt-calculator/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the APK'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build CFX-9960GT Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x cfx9960gt-calculator/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ${{ github.workspace }}/cfx9960gt-calculator

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfx9960gt-calculator-debug
          path: cfx9960gt-calculator/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cfx9960gt-v1.0.${{ github.run_number }}
          name: CFX-9960GT Calculator v1.0.${{ github.run_number }}
          body: |
            Casio CFX-9960GTe recreation for Supernote Nomad (Chauvet OS).

            **How to sideload:**
            1. Download `app-debug.apk` below.
            2. Transfer it to your Supernote Nomad via USB or WiFi.
            3. On the tablet, enable *Install unknown apps* and open the APK to install.
          files: cfx9960gt-calculator/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
