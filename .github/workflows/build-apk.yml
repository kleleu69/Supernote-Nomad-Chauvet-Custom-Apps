name: Build & Release APK

on:
  push:
    branches: [ "main", "copilot/**" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the APK'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-classwiz:
    name: Build ClassWiz Calculator APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x classwiz-calculator/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ${{ github.workspace }}/classwiz-calculator

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: classwiz-calculator-debug
          path: classwiz-calculator/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: classwiz-v1.0.${{ github.run_number }}
          name: ClassWiz Calculator v1.0.${{ github.run_number }}
          body: |
            ClassWiz-inspired calculator for Supernote Nomad (Chauvet OS).

            **How to sideload:**
            1. Download `app-debug.apk` below.
            2. Transfer it to your Supernote Nomad via USB or WiFi.
            3. On the tablet, enable *Install unknown apps* and open the APK to install.
          files: classwiz-calculator/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ganttproject:
    name: Build GanttProject APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ganttproject/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ${{ github.workspace }}/ganttproject

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ganttproject-debug
          path: ganttproject/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ganttproject-v1.0.${{ github.run_number }}
          name: GanttProject v1.0.${{ github.run_number }}
          body: |
            GanttProject for Supernote Nomad (Chauvet OS) — create and manage project schedules with Gantt charts on your e-ink device.

            **How to sideload:**
            1. Download `app-debug.apk` from the **Assets** section below.
            2. Transfer it to your Supernote Nomad via USB cable or WiFi file transfer.
            3. On the Nomad, navigate to the APK file in the file manager.
            4. Tap the APK → enable *Install unknown apps* if prompted → tap **Install**.
            5. Find **GanttProject** in your app launcher and enjoy!
          files: ganttproject/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
