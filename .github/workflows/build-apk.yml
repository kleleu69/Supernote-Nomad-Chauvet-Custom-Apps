name: Build ClassWiz Calculator APK

on:
  push:
    branches: [ "main", "feature/supernote-ClassWizCalculator", "copilot/**" ]
    paths:
      - 'classwiz-calculator/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'classwiz-calculator/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the APK'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build ClassWiz Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x classwiz-calculator/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ${{ github.workspace }}/classwiz-calculator

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: classwiz-calculator-debug
          path: classwiz-calculator/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ClassWiz Calculator v1.0.${{ github.run_number }}
          body: |
            ClassWiz-inspired calculator for Supernote Nomad (Chauvet OS).

            **How to sideload:**
            1. Download `app-debug.apk` below.
            2. Transfer it to your Supernote Nomad via USB or WiFi.
            3. On the tablet, enable *Install unknown apps* and open the APK to install.
          files: classwiz-calculator/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
