name: Build & Release APK

on:
  push:
    branches: [ "main", "copilot/**" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the APK'
        required: false
        default: 'false'
        type: boolean

jobs:
  discover-projects:
    name: Discover Android app projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.discover.outputs.projects }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover buildable projects
        id: discover
        shell: bash
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          projects = []
          for path in sorted(Path(".").iterdir()):
              if not path.is_dir():
                  continue
              if not (path / "gradlew").is_file():
                  continue
              if not (path / "settings.gradle").is_file():
                  continue
              if not (path / "app" / "build.gradle").is_file():
                  continue

              projects.append({
                  "name": path.name,
                  "path": path.name,
                  "apk": f"{path.name}/app/build/outputs/apk/debug/app-debug.apk"
              })

          if not projects:
              raise SystemExit("No buildable Android app projects found in the repository root.")

          print("projects=" + json.dumps(projects))
          PY

  build:
    name: Build ${{ matrix.project.name }} Debug APK
    runs-on: ubuntu-latest
    needs: discover-projects
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover-projects.outputs.projects) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x "${{ matrix.project.path }}/gradlew"
        working-directory: ${{ github.workspace }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ${{ github.workspace }}/${{ matrix.project.path }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-debug
          path: ${{ matrix.project.apk }}
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-debug"
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Supernote Android Apps v1.0.${{ github.run_number }}
          body: |
            Debug APK bundle built from Android app projects discovered in the repository root for Supernote Nomad (Chauvet OS).

            **How to sideload:**
            1. Download the APK asset you want below.
            2. Transfer it to your Supernote Nomad via USB or WiFi.
            3. On the tablet, enable *Install unknown apps* and open the APK to install.
          files: release-assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
