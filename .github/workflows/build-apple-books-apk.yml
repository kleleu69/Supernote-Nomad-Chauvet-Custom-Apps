name: Build Apple Books APK

on:
  push:
    branches: [ "main", "copilot/**", "feature/supernote-AppleBooks" ]
    paths:
      - "applefiles-icloud-android/**"
      - ".github/workflows/build-apple-books-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Apple Books Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ${{ github.workspace }}/applefiles-icloud-android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ${{ github.workspace }}/applefiles-icloud-android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apple-books-debug
          path: applefiles-icloud-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
